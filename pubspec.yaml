flutter_launcher_icons:
  android: true
  ios: true
  remove_alpha_ios: true
  image_path: assets/images/logo/logo_2.png
  image_path_android: assets/images/logo/logo_2.png
  image_path_ios: assets/images/logo/logo.png
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: assets/images/logo/logo_2.png
  adaptive_icon_monochrome: assets/images/logo/logo_2.png
  macos:
    generate: true
    image_path: assets/images/logo/logo.png

flutter_native_splash:
  android_12:
    color: "#ffffff"
    color_dark: "#212121"
  color: "#ffffff"
  color_dark: "#212121"
  image: assets/images/logo/logo_2.png
  image_dark: assets/images/logo/logo_2.png

flutter:
  uses-material-design: true

  assets:
    - path: assets/images/
    - path: assets/images/logo/
    - path: assets/images/logo/ico/
      platforms: [windows]
    - path: assets/images/logo/desktop/
      platforms: [linux, macos]
    - path: assets/images/live/
    - path: assets/images/paycoins/
    - path: assets/shaders/

  fonts:
    - family: digital_id_num
      fonts:
        - asset: assets/fonts/digital_id_num.ttf
    - family: custom_icon
      fonts:
        - asset: assets/fonts/custom_icon.ttf
